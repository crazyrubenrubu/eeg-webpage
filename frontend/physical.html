<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindFlow · Physical Activity</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Page specific styles – using CSS variables for theme compatibility */
        .detail-page {
            max-width: 1200px;
            margin: 2rem auto;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 3rem;
            padding: 2rem;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2);
            border: 1px solid var(--card-border);
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-header h1 {
            font-weight: 400;
            color: var(--text-primary);
            font-size: 2.2rem;
            margin: 0;
        }
        .page-header h1 i {
            color: var(--accent);
            margin-right: 0.5rem;
        }
        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .back-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .back-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }
        .theme-toggle {
            background: var(--pill-bg);
            border: 1px solid var(--border-light);
            color: var(--pill-text);
            padding: 0.6rem 1.2rem;
            border-radius: 3rem;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .activity-card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid var(--card-border);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .activity-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -10px var(--accent);
            border-color: var(--accent);
        }
        .activity-card h3 {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }
        .activity-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0;
        }
        /* Ensure dark mode text contrasts */
        body.dark-mode .activity-card {
            background: rgba(30, 41, 59, 0.8);
        }
        body.dark-mode .activity-card h3 {
            color: #f1f5f9;
        }
        body.dark-mode .activity-card p {
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="detail-page">
        <div class="page-header">
            <h1><i class="fas fa-heartbeat"></i> Physical Activity</h1>
            <div class="header-actions">
                <button id="themeTogglePage" class="theme-toggle" onclick="toggleTheme()">🌓</button>
                <a href="solutions.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Remedies</a>
            </div>
        </div>

        <!-- Single grid with all activities (no tabs) -->
        <div id="allActivities" class="activity-grid"></div>

    </div>

    <!-- Chatbot -->
    <div class="chat-icon" id="chatIcon">
        <img src="custom-brain.png" alt="Chat" class="chat-custom-img">
    </div>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">AI assistant <i class="fas fa-robot"></i></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Ask about exercises..." />
            <button id="sendChat"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="chatbot.js"></script>
    <script>
        // Theme toggle function (same as in other pages)
        window.toggleTheme = function() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        };
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        // Physical activity data (combined from all conditions)
        const physicalData = [
            // Stress
            { title: "Guided Meditation", desc: "Calm your mind and lower stress levels with guided meditation.", customUrl: "Meditation/index.html" },
            { title: "Neck & Shoulder Stretch", desc: "Relieve physical tension built up from stress.", customUrl: "neck_shoulder/index.html" },
            { title: "Eye Relaxation", desc: "Rest your eyes to reduce visual strain and headaches.", customUrl: "eye_exercise/index.html" },
            { title: "Walk & Stretch", desc: "Take a short walk and stretch to reset your body.", customUrl: "walk_and_stretch/index.html" },
            // Anxiety
            { title: "Grounding (5-4-3-2-1)", desc: "Identify 5 things you see, 4 touch, 3 hear, 2 smell, 1 taste.", slug: "grounding-54321" },
            // Depression
            { title: "Smile Exercise", desc: "Hold a gentle smile for 30–60 seconds.", slug: "smile-exercise" }
        ];

        // Deduplicate by title (case‑insensitive)
        const seen = new Set();
        const uniqueActivities = physicalData.filter(item => {
            const key = item.title.toLowerCase();
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
        });

        function renderAllActivities() {
            const container = document.getElementById('allActivities');
            if (!container) return;
            let html = '';
            uniqueActivities.forEach(item => {
                const targetUrl = item.customUrl || `activity.html?activity=${item.slug}`;
                html += `
                    <a href="${targetUrl}" class="activity-card">
                        <h3>${item.title}</h3>
                        <p>${item.desc}</p>
                    </a>
                `;
            });
            container.innerHTML = html;
        }

        renderAllActivities();
    </script>

</body>
</html>
