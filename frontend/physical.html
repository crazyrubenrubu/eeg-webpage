<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindFlow · Physical Activity</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .detail-page {
            max-width: 1200px;
            margin: 2rem auto;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 3rem;
            padding: 2rem;
            box-shadow: 0 20px 40px -10px #1f4b57;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .page-header h1 {
            font-weight: 400;
            color: #1b4c5c;
            font-size: 2.2rem;
        }
        .back-btn {
            background: #2f7d8f;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .back-btn:hover {
            background: #3e93a8;
        }
        .tab-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #cde3ea;
            padding-bottom: 0.5rem;
        }
        .tab {
            background: transparent;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 3rem 3rem 0 0;
            font-weight: 500;
            color: #386e7c;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .tab.active {
            background: #ffffffd0;
            color: #1f5969;
            box-shadow: 0 -4px 8px #b0d3de;
        }
        .tab:hover {
            background: #e1f2f8;
        }
        .condition-content {
            display: none;
            animation: fade 0.3s;
        }
        .condition-content.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.2rem;
            margin-top: 1rem;
        }
        .activity-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .activity-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -10px #2d6575;
        }
        .activity-card h3 {
            font-weight: 500;
            color: #194a56;
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }
        .activity-card p {
            color: #437682;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="detail-page">
        <div class="page-header">
            <h1><i class="fas fa-heartbeat" style="color:#2f7d8f;"></i> Physical Activity</h1>
            <a href="solutions.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Remedies</a>
        </div>

        <!-- Tabs for conditions -->
        <div class="tab-container" id="tabContainer">
            <button class="tab active" data-condition="stress">Stress</button>
            <button class="tab" data-condition="anxiety">Anxiety</button>
            <button class="tab" data-condition="depression">Depression</button>
            <button class="tab" data-condition="sleep">Sleep Deprivation</button>
            <button class="tab" data-condition="distraction">Distraction</button>
        </div>

        <!-- Content containers -->
        <div id="stress" class="condition-content active"></div>
        <div id="anxiety" class="condition-content"></div>
        <div id="depression" class="condition-content"></div>
        <div id="sleep" class="condition-content"></div>
        <div id="distraction" class="condition-content"></div>
    </div>

    <div class="chat-icon" id="chatIcon"><i class="fas fa-comment-dots"></i></div>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">AI assistant <i class="fas fa-robot"></i></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Ask about exercises..." />
            <button id="sendChat"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <script src="chatbot.js"></script>
    <script>
        window.toggleTheme = function() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        };
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

        // Physical activity data updated with all FOUR custom modules!
        const physicalData = {
            stress: [
                { title: "Guided Meditation", desc: "Calm your mind and lower stress levels with guided meditation.", customUrl: "../Meditation/index.html" },
                { title: "Neck & Shoulder Stretch", desc: "Relieve physical tension built up from stress.", customUrl: "../neck shoulder/index.html" },
                { title: "Eye Relaxation", desc: "Rest your eyes to reduce visual strain and headaches.", customUrl: "../eye exercise/index.html" },
                { title: "Walk & Stretch", desc: "Take a short walk and stretch to reset your body.", customUrl: "../walk and stretch/index.html" }
            ],
            anxiety: [
                { title: "Guided Meditation", desc: "Center your thoughts and slow your racing mind.", customUrl: "../Meditation/index.html" },
                { title: "Neck & Shoulder Stretch", desc: "Release the physical anxiety held in your upper body.", customUrl: "../neck shoulder/index.html" },
                { title: "Walk & Stretch", desc: "Focus on breathing and your surroundings while moving.", customUrl: "../walk and stretch/index.html" },
                { title: "Grounding (5-4-3-2-1)", desc: "Identify 5 things you see, 4 touch, 3 hear, 2 smell, 1 taste.", slug: "grounding-54321" }
            ],
            depression: [
                { title: "Guided Meditation", desc: "Find a moment of peace and gentle reflection.", customUrl: "../Meditation/index.html" },
                { title: "Neck & Shoulder Stretch", desc: "Release tension and open up your posture.", customUrl: "../neck shoulder/index.html" },
                { title: "Walk & Stretch", desc: "Light movement and walking to improve mood and energy.", customUrl: "../walk and stretch/index.html" },
                { title: "Smile Exercise", desc: "Hold a gentle smile for 30–60 seconds.", slug: "smile-exercise" }
            ],
            sleep: [
                { title: "Eye Relaxation", desc: "Prepare your eyes and mind for rest.", customUrl: "../eye exercise/index.html" },
                { title: "Gentle Neck Stretch", desc: "Release the day's tension before getting into bed.", customUrl: "../neck shoulder/index.html" },
                { title: "Guided Meditation", desc: "Drift off with a soothing guided session.", customUrl: "../Meditation/index.html" },
                { title: "Walk & Stretch", desc: "Light body stretch to physically wind down.", customUrl: "../walk and stretch/index.html" }
            ],
            distraction: [
                { title: "Eye Focus Exercise", desc: "Refocus your vision to refocus your mind.", customUrl: "../eye exercise/index.html" },
                { title: "Neck & Shoulder Stretch", desc: "Relieve desk-posture stiffness to improve focus.", customUrl: "../neck shoulder/index.html" },
                { title: "Guided Meditation", desc: "Clear the mental clutter and regain your focus.", customUrl: "../Meditation/index.html" },
                { title: "Walk & Stretch", desc: "A quick walk away from your desk to reset your attention.", customUrl: "../walk and stretch/index.html" }
            ]
        };

        function renderCondition(containerId, items) {
            const container = document.getElementById(containerId);
            if (!container) return;
            let html = '<div class="activity-grid">';
            items.forEach(item => {
                // Magic routing: Checks for customUrl first, falls back to standard slug
                const targetUrl = item.customUrl ? item.customUrl : `activity.html?activity=${item.slug}`;
                html += `
                    <a href="${targetUrl}" class="activity-card">
                        <h3>${item.title}</h3>
                        <p>${item.desc}</p>
                    </a>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        renderCondition('stress', physicalData.stress);
        renderCondition('anxiety', physicalData.anxiety);
        renderCondition('depression', physicalData.depression);
        renderCondition('sleep', physicalData.sleep);
        renderCondition('distraction', physicalData.distraction);

        const tabs = document.querySelectorAll('.tab');
        const contents = document.querySelectorAll('.condition-content');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                contents.forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.condition).classList.add('active');
            });
        });
    </script>

</body>
</html>
