<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindFlow · Guided Activity</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .activity-page {
            max-width: 800px;
            margin: 2rem auto;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 3rem;
            padding: 2rem;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2);
            border: 1px solid var(--card-border);
            text-align: center;
        }
        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .activity-header h1 {
            font-weight: 400;
            color: var(--text-primary);
            font-size: 2rem;
            margin: 0;
        }
        .back-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 3rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .back-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }
        .animation-container {
            margin: 2rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .breathing-circle {
            width: 200px;
            height: 200px;
            background: var(--accent-light);
            border-radius: 50%;
            margin: 1rem auto;
            transition: transform 4s ease-in-out, background-color 1s;
            box-shadow: 0 0 30px var(--accent);
        }
        .timer {
            font-size: 3rem;
            font-weight: 300;
            color: var(--text-primary);
            margin: 1rem 0;
        }
        .instruction {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        .audio-control {
            margin: 1rem 0;
        }
        .audio-control button {
            background: var(--pill-bg);
            border: 1px solid var(--border-light);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.2s;
        }
        .audio-control button:hover {
            background: var(--accent);
            color: white;
        }
        .youtube-audio {
            width: 100%;
            height: 0;
            position: relative;
            padding-bottom: 56.25%;
            margin-top: 1rem;
        }
        .youtube-audio iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 2rem;
        }
    </style>
</head>
<body>
    <div class="activity-page" id="activityPage">
        <div class="activity-header">
            <h1 id="activityTitle">Guided Exercise</h1>
            <a href="physical.html" class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Back</a>
        </div>

        <div class="animation-container">
            <div id="instruction" class="instruction">Get ready...</div>
            <div id="breathingCircle" class="breathing-circle"></div>
            <div id="timer" class="timer">0:00</div>
        </div>

        <div class="audio-control">
            <button id="audioToggle">🔇 Unmute Calming Audio</button>
        </div>
        <div id="youtubeAudio" class="youtube-audio" style="display: none;">
            <iframe id="youtubeIframe" width="100%" height="100%" src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=0&mute=1&loop=1&playlist=jfKfPfyJRdk" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // Theme toggle not needed here, but we'll apply the saved theme
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        // Get activity slug from URL
        const urlParams = new URLSearchParams(window.location.search);
        const activity = urlParams.get('activity') || 'breathing-444';

        // Activity details
        const activities = {
            'breathing-444': {
                title: 'Deep Breathing (4-4-4)',
                type: 'breathing',
                pattern: [4, 4, 4], // inhale, hold, exhale (seconds)
                audio: 'jfKfPfyJRdk' // Lo-fi music video ID
            },
            'breathing-4-6': {
                title: 'Deep Breathing (4-6)',
                type: 'breathing',
                pattern: [4, 0, 6],
                audio: 'eKFTSSKCzWA'
            },
            'grounding-54321': {
                title: 'Grounding Exercise (5-4-3-2-1)',
                type: 'grounding',
                audio: '2OEL4P1Rz04'
            },
            'smile-exercise': {
                title: 'Smile Exercise',
                type: 'simple',
                audio: 'jfKfPfyJRdk'
            }
        };

        const activityData = activities[activity] || {
            title: activity.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
            type: 'simple',
            audio: 'jfKfPfyJRdk'
        };

        document.getElementById('activityTitle').innerText = activityData.title;

        // Set up YouTube iframe
        const iframe = document.getElementById('youtubeIframe');
        iframe.src = `https://www.youtube.com/embed/${activityData.audio}?autoplay=0&mute=1&loop=1&playlist=${activityData.audio}`;

        // Audio toggle
        const audioToggle = document.getElementById('audioToggle');
        const youtubeDiv = document.getElementById('youtubeAudio');
        let isMuted = true;
        audioToggle.addEventListener('click', () => {
            if (isMuted) {
                iframe.src = iframe.src.replace('mute=1', 'mute=0');
                audioToggle.innerHTML = '🔊 Mute Audio';
                youtubeDiv.style.display = 'block';
            } else {
                iframe.src = iframe.src.replace('mute=0', 'mute=1');
                audioToggle.innerHTML = '🔇 Unmute Calming Audio';
            }
            isMuted = !isMuted;
        });

        // Breathing animation
        if (activityData.type === 'breathing') {
            const pattern = activityData.pattern;
            const circle = document.getElementById('breathingCircle');
            const instruction = document.getElementById('instruction');
            const timerDiv = document.getElementById('timer');
            let phase = 0;
            let timeLeft = pattern[0];
            let interval;

            function updatePhase() {
                if (phase === 0) {
                    instruction.innerText = 'Inhale slowly...';
                    circle.style.transform = 'scale(1.2)';
                    circle.style.background = 'var(--accent-light)';
                    timeLeft = pattern[0];
                } else if (phase === 1) {
                    instruction.innerText = 'Hold...';
                    circle.style.transform = 'scale(1.2)';
                    circle.style.background = 'var(--accent)';
                    timeLeft = pattern[1];
                } else if (phase === 2) {
                    instruction.innerText = 'Exhale gently...';
                    circle.style.transform = 'scale(1)';
                    circle.style.background = 'var(--accent-light)';
                    timeLeft = pattern[2];
                }
                timerDiv.innerText = formatTime(timeLeft);
            }

            function formatTime(sec) {
                return `${Math.floor(sec / 60)}:${(sec % 60).toString().padStart(2, '0')}`;
            }

            function nextPhase() {
                phase = (phase + 1) % 3;
                if (phase === 1 && pattern[1] === 0) phase = 2;
                if (phase === 2 && pattern[2] === 0) phase = 0;
                updatePhase();
            }

            function tick() {
                timeLeft--;
                timerDiv.innerText = formatTime(timeLeft);
                if (timeLeft <= 0) {
                    nextPhase();
                }
            }

            updatePhase();
            interval = setInterval(tick, 1000);
        } else {
            document.getElementById('breathingCircle').style.display = 'none';
            const instruction = document.getElementById('instruction');
            instruction.innerText = 'Follow the timer below:';
            let seconds = 60;
            const timerDiv = document.getElementById('timer');
            timerDiv.innerText = '1:00';
            let countdown = setInterval(() => {
                seconds--;
                if (seconds < 0) {
                    clearInterval(countdown);
                    timerDiv.innerText = 'Done!';
                    instruction.innerText = 'Great job!';
                } else {
                    timerDiv.innerText = formatTime(seconds);
                }
            }, 1000);
        }

        function formatTime(sec) {
            return `${Math.floor(sec / 60)}:${(sec % 60).toString().padStart(2, '0')}`;
        }

        // Adjust back button based on referrer (optional)
        const backBtn = document.getElementById('backBtn');
        backBtn.href = document.referrer.includes('physical.html') ? 'physical.html' : 'solutions.html';
    </script>
</body>
</html>
