<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindFlow · Visual Therapy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .detail-page {
            max-width: 850px;
            width: 100%;
            margin: 2rem auto;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 2.5rem;
            padding: 1.5rem;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2);
            border: 1px solid var(--card-border);
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-header h1 {
            font-weight: 400;
            color: var(--text-primary);
            font-size: 1.8rem;
            margin: 0;
        }
        .page-header h1 i {
            color: var(--accent);
            margin-right: 0.5rem;
        }
        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .back-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 3rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .back-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }
        .theme-toggle {
            background: var(--pill-bg);
            border: 1px solid var(--border-light);
            color: var(--pill-text);
            padding: 0.6rem 1.2rem;
            border-radius: 3rem;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .tab-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border-light);
            padding-bottom: 0.2rem;
        }
        .tab {
            background: transparent;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem 2rem 0 0;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .tab.active {
            background: var(--card-bg);
            color: var(--accent);
            box-shadow: 0 -4px 8px var(--border-light);
        }
        .tab:hover {
            background: rgba(128,128,128,0.1);
        }
        .condition-content {
            display: none;
            animation: fade 0.3s;
        }
        .condition-content.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .block-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            list-style: none;
        }
        .block-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 4px 10px -4px rgba(0,0,0,0.1);
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--card-border);
            height: 280px;
        }
        .block-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -8px var(--accent);
            border-color: var(--accent);
        }
        .card-thumb {
            width: 100%;
            height: 110px;
            object-fit: cover;
            display: block;
            background: var(--border-light);
        }
        .card-content {
            padding: 0.8rem 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .card-title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.3;
            height: 2.6rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            margin-bottom: 0.3rem;
        }
        .card-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
            height: 3.4rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            margin-bottom: 0.5rem;
        }
        .card-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            background: rgba(128,128,128,0.1);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            transition: 0.2s;
            align-self: flex-start;
            border: 1px solid var(--border-light);
            margin-top: auto;
        }
        .card-link i {
            font-size: 0.8rem;
            color: #c4302b;
        }
        .card-link:hover {
            background: var(--accent);
            color: white;
        }
        @media (max-width: 640px) {
            .block-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="detail-page">
        <div class="page-header">
            <h1><i class="fas fa-eye"></i> Visual Therapy</h1>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
                <a href="solutions.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            </div>
        </div>

        <div class="tab-container">
            <button class="tab active" data-condition="stress">Stress</button>
            <button class="tab" data-condition="anxiety">Anxiety</button>
            <button class="tab" data-condition="depression">Depression</button>
            <button class="tab" data-condition="sleep">Sleep</button>
            <button class="tab" data-condition="distraction">Distraction</button>
        </div>

        <div id="stress" class="condition-content active"></div>
        <div id="anxiety" class="condition-content"></div>
        <div id="depression" class="condition-content"></div>
        <div id="sleep" class="condition-content"></div>
        <div id="distraction" class="condition-content"></div>
    </div>

    <script>
        window.toggleTheme = function() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        };
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        function getYouTubeThumbnail(url) {
            const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/);
            return match ? `https://img.youtube.com/vi/${match[1]}/mqdefault.jpg` : '';
        }

        const visualData = {
            stress: [
                { 
                    title: "Blue Light Relaxation Therapy", 
                    desc: "Soft blue light visuals help calm the nervous system and reduce mental tension. Blue tones can promote a peaceful mental state and reduce overstimulation.", 
                    url: "https://www.youtube.com/watch?v=1ZYbU82GVz4" 
                },
                { 
                    title: "Nature Visual Therapy (Forest / Water Scenes)", 
                    desc: "Watching nature scenes reduces stress and lowers heart rate. Natural environments trigger relaxation responses in the brain.", 
                    url: "https://www.youtube.com/watch?v=OdIJ2x3nxzQ" 
                },
                { 
                    title: "Color Therapy (Green Relaxation Screen)", 
                    desc: "Green color visuals are associated with balance and calmness. Helps reduce anxiety and promotes mental relaxation.", 
                    url: "https://www.youtube.com/watch?v=8n9G9FQpH2Q" 
                },
                { 
                    title: "Slow Moving Mandala / Visual Meditation", 
                    desc: "Watching slow moving symmetrical patterns can calm the mind. Helps the brain shift into a relaxed Alpha wave state.", 
                    url: "https://www.youtube.com/watch?v=5X1h6D9s5nY" 
                }
            ],
            anxiety: [
                { 
                    title: "Calm Ocean Waves Visual Therapy", 
                    desc: "Watching slow ocean waves and water movement helps calm the brain and reduce anxious thoughts. The repetitive movement encourages relaxation.", 
                    url: "https://www.youtube.com/watch?v=V1RPi2MYptM" 
                },
                { 
                    title: "Soft Warm Light / Sunset Therapy", 
                    desc: "Warm sunset lighting visuals create a calm and comforting atmosphere. Warm tones reduce visual stimulation and help the brain feel safe.", 
                    url: "https://www.youtube.com/watch?v=V7yqW64Dx7c" 
                },
                { 
                    title: "Slow Breathing Visual Guide", 
                    desc: "A visual breathing animation helps users follow a slow breathing rhythm. Synchronizing breath reduces anxiety and stabilizes the nervous system.", 
                    url: "https://www.youtube.com/watch?v=tybOi4hjZFQ" 
                },
                { 
                    title: "Space / Starfield Relaxation Visual", 
                    desc: "Watching slow-moving stars or space visuals helps clear racing thoughts. The vast, slow movement helps shift attention away from anxious thinking.", 
                    url: "https://www.youtube.com/watch?v=FjHGZj2IjBk" 
                }
            ],
            depression: [
                { 
                    title: "Morning Sunlight / Bright Light Therapy", 
                    desc: "Exposure to bright light visuals that simulate natural sunlight. Bright light stimulates serotonin production and helps regulate mood and circadian rhythm.", 
                    url: "https://www.youtube.com/watch?v=6H8E6k5V2qA" 
                },
                { 
                    title: "Nature Landscape Therapy (Mountains / Green Fields)", 
                    desc: "Viewing peaceful landscapes like mountains and meadows improves mood and reduces negative thinking.", 
                    url: "https://www.youtube.com/watch?v=1ZYbU82GVz4" 
                },
                { 
                    title: "Motivational Sunrise Visual", 
                    desc: "Watching sunrise visuals that symbolize a fresh start and positive energy. Warm light colors help promote optimism.", 
                    url: "https://www.youtube.com/watch?v=UfcAVejslrU" 
                },
                { 
                    title: "Flowing Water / River Visual Therapy", 
                    desc: "Watching slow moving rivers or waterfalls reduces rumination and creates a calming mental rhythm.", 
                    url: "https://www.youtube.com/watch?v=OdIJ2x3nxzQ" 
                }
            ],
            sleep: [
                { 
                    title: "Night Sky / Starfield Relaxation Visual", 
                    desc: "Watching calm night sky visuals helps prepare the brain for rest. Slow-moving stars and dark tones reduce stimulation before sleep.", 
                    url: "https://www.youtube.com/watch?v=6LT3gZt0e6o" 
                },
                { 
                    title: "Warm Light / Night Mode Therapy", 
                    desc: "Warm dim lighting visuals simulate evening light conditions, reducing blue light exposure and supporting natural circadian rhythms.", 
                    url: "https://www.youtube.com/watch?v=V7yqW64Dx7c" 
                },
                { 
                    title: "Slow Ocean Waves Visual", 
                    desc: "Watching gentle ocean waves calms the mind and prepares the body for rest. The repetitive motion creates a relaxing rhythm.", 
                    url: "https://www.youtube.com/watch?v=V1RPi2MYptM" 
                },
                { 
                    title: "Candle Flame Relaxation Visual", 
                    desc: "Watching a slow candle flame creates a calming, meditative environment. Soft flickering light encourages relaxation before sleep.", 
                    url: "https://www.youtube.com/watch?v=LXb3EKWsInQ" 
                }
            ],
            distraction: [
                { 
                    title: "Focus Timer / Pomodoro Visual", 
                    desc: "A visual timer that divides work into focused intervals (usually 25 minutes). The structured timer helps the brain stay engaged.", 
                    url: "https://www.youtube.com/watch?v=3FjIuPMQzxo" 
                },
                { 
                    title: "Minimalist Focus Screen", 
                    desc: "A simple, clutter-free screen with minimal visual elements reduces cognitive overload and helps maintain concentration.", 
                    url: "https://www.youtube.com/watch?v=DWcJFNfaw9c" 
                },
                { 
                    title: "Focus Animation / Breathing Dot", 
                    desc: "A moving dot or small animation that guides breathing and attention. Following the motion trains the brain to focus on a single stimulus.", 
                    url: "https://www.youtube.com/watch?v=bF_1ZiFta-E" 
                },
                { 
                    title: "Study Environment Visual (Library)", 
                    desc: "Watching calm study environments creates a productive atmosphere. Environmental cues signal the brain that it is time to focus.", 
                    url: "https://www.youtube.com/watch?v=lFcSrYw-ARY" 
                }
            ]
        };

        function renderCondition(containerId, items) {
            const container = document.getElementById(containerId);
            if (!container) return;
            let html = '<ul class="block-grid">';
            items.forEach(item => {
                const thumbUrl = getYouTubeThumbnail(item.url);
                html += `
                    <li class="block-card">
                        <img class="card-thumb" src="${thumbUrl}" alt="${item.title}" loading="lazy">
                        <div class="card-content">
                            <div class="card-title">${item.title}</div>
                            <div class="card-desc">${item.desc}</div>
                            <a href="${item.url}" target="_blank" class="card-link"><i class="fab fa-youtube"></i> Watch</a>
                        </div>
                    </li>
                `;
            });
            html += '</ul>';
            container.innerHTML = html;
        }

        renderCondition('stress', visualData.stress);
        renderCondition('anxiety', visualData.anxiety);
        renderCondition('depression', visualData.depression);
        renderCondition('sleep', visualData.sleep);
        renderCondition('distraction', visualData.distraction);

        const tabs = document.querySelectorAll('.tab');
        const contents = document.querySelectorAll('.condition-content');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                contents.forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.condition).classList.add('active');
            });
        });
    </script>
</body>
</html>
