<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindFlow · Lifestyle Changes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .detail-page {
            max-width: 850px;
            width: 100%;
            margin: 2rem auto;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 2.5rem;
            padding: 1.5rem;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2);
            border: 1px solid var(--card-border);
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-header h1 {
            font-weight: 400;
            color: var(--text-primary);
            font-size: 1.8rem;
            margin: 0;
        }
        .page-header h1 i {
            color: var(--accent);
            margin-right: 0.5rem;
        }
        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .back-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 3rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .back-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }
        .theme-toggle {
            background: var(--pill-bg);
            border: 1px solid var(--border-light);
            color: var(--pill-text);
            padding: 0.6rem 1.2rem;
            border-radius: 3rem;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .block-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            list-style: none;
        }
        .block-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 4px 10px -4px rgba(0,0,0,0.1);
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--card-border);
            height: 280px;
        }
        .block-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -8px var(--accent);
            border-color: var(--accent);
        }
        .card-icon {
            width: 100%;
            height: 110px;
            background: var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--accent);
        }
        .card-content {
            padding: 0.8rem 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .card-title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.3;
            height: 2.6rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            margin-bottom: 0.3rem;
        }
        .card-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
            height: 3.4rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            margin-bottom: 0.5rem;
        }
        .card-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            background: rgba(128,128,128,0.1);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            transition: 0.2s;
            align-self: flex-start;
            border: 1px solid var(--border-light);
            margin-top: auto;
        }
        .card-link i {
            font-size: 0.8rem;
            color: var(--accent);
        }
        .card-link:hover {
            background: var(--accent);
            color: white;
        }
        @media (max-width: 640px) {
            .block-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="detail-page">
        <div class="page-header">
            <h1><i class="fas fa-leaf"></i> Lifestyle Changes</h1>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
                <a href="solutions.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            </div>
        </div>

        <div id="lifestyle-content" class="condition-content active"></div>
    </div>

    <script>
        window.toggleTheme = function() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        };
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        function getSearchUrl(query) {
            return `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        }

        const lifestyleTips = [
            {
                icon: "fa-droplet",
                title: "Drink more water",
                desc: "Staying hydrated helps regulate cortisol and reduces stress. Aim for 8 glasses daily.",
                query: "hydration stress relief"
            },
            {
                icon: "fa-mug-saucer",
                title: "Reduce caffeine",
                desc: "Caffeine can spike anxiety and stress hormones. Try switching to herbal tea.",
                query: "caffeine stress reduction"
            },
            {
                icon: "fa-sun",
                title: "Daily sunlight exposure",
                desc: "Morning sunlight boosts vitamin D and serotonin, improving mood and lowering stress.",
                query: "sunlight exposure stress"
            },
            {
                icon: "fa-person-walking",
                title: "20–30 min daily exercise",
                desc: "Moderate exercise releases endorphins, reduces stress, and improves sleep.",
                query: "exercise for stress management"
            }
        ];

        function renderTips(containerId, items) {
            const container = document.getElementById(containerId);
            if (!container) return;
            let html = '<ul class="block-grid">';
            items.forEach(item => {
                html += `
                    <li class="block-card">
                        <div class="card-icon"><i class="fas ${item.icon}"></i></div>
                        <div class="card-content">
                            <div class="card-title">${item.title}</div>
                            <div class="card-desc">${item.desc}</div>
                            <a href="${getSearchUrl(item.query)}" target="_blank" class="card-link"><i class="fas fa-magnifying-glass"></i> Learn more</a>
                        </div>
                    </li>
                `;
            });
            html += '</ul>';
            container.innerHTML = html;
        }

        renderTips('lifestyle-content', lifestyleTips);
    </script>
</body>
</html>
