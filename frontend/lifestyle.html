<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindFlow · Lifestyle Changes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #d4e9f0 0%, #eaf3f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .detail-page {
            max-width: 850px;
            width: 100%;
            margin: 1rem auto;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 2.5rem;
            padding: 1rem;
            box-shadow: 0 20px 40px -10px #1f4b57;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .page-header h1 {
            font-weight: 400;
            color: #1b4c5c;
            font-size: 1.8rem;
        }

        .back-btn {
            background: #2f7d8f;
            color: white;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2.5rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .back-btn:hover {
            background: #3e93a8;
        }

        /* ========== CARD GRID ========== */
        .block-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.7rem;
            list-style: none;
        }

        .block-card {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 10px -4px rgba(31, 75, 87, 0.1);
            transition: transform 0.15s, box-shadow 0.15s;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.6);
            height: 260px;
        }

        .block-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -6px #1f4b57;
        }

        .card-icon {
            width: 100%;
            height: 100px;
            background: #cde3ea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #1f5a68;
        }

        .card-content {
            padding: 0.7rem 0.6rem 0.8rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card-title {
            font-weight: 600;
            color: #1d4b56;
            font-size: 1.1rem;
            line-height: 1.3;
            height: 2.9rem;                         /* fallback for 2 lines */
            overflow: hidden;
            /* stylelint-disable-next-line property-no-vendor-prefix */
            display: -webkit-box;                    /* required for line-clamp */
            /* stylelint-disable-next-line property-no-vendor-prefix */
            -webkit-box-orient: vertical;            /* required for line-clamp */
            -webkit-line-clamp: 2;                   /* limits to 2 lines */
            line-clamp: 2;                           /* standard (experimental) */
            margin-bottom: 0.2rem;
            word-break: break-word;
        }

        .card-desc {
            font-size: 0.75rem;
            color: #437682;
            line-height: 1.4;
            height: 3.2rem;                         /* fallback for 3 lines */
            overflow: hidden;
            /* stylelint-disable-next-line property-no-vendor-prefix */
            display: -webkit-box;                    /* required for line-clamp */
            /* stylelint-disable-next-line property-no-vendor-prefix */
            -webkit-box-orient: vertical;            /* required for line-clamp */
            -webkit-line-clamp: 3;                   /* limits to 3 lines */
            line-clamp: 3;                           /* standard (experimental) */
            margin-bottom: 0.4rem;
            word-break: break-word;
        }

        .card-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            background: #e1f2f8;
            padding: 0.3rem 0.7rem;
            border-radius: 2rem;
            color: #1f5a68;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 500;
            transition: 0.2s;
            align-self: flex-start;
            border: none;
            cursor: pointer;
            margin-top: auto;
        }

        .card-link i {
            font-size: 0.8rem;
            color: #2f7d8f;
        }

        .card-link:hover {
            background: #c5e3ef;
            color: #0d3b47;
        }

        @media (max-width: 640px) {
            .block-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="detail-page">
        <div class="page-header">
            <h1><i class="fas fa-leaf" style="color:#2f7d8f;"></i> Lifestyle Changes</h1>
            <a href="solutions.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Remedies</a>
        </div>

        <!-- Single content area (no tabs) -->
        <div id="lifestyle-content" class="condition-content active"></div>
    </div>

    <script>
        function getSearchUrl(query) {
            return `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        }

        // One set of lifestyle tips (you can replace with any condition's data)
        const lifestyleTips = [
            {
                icon: "fa-droplet",
                title: "Drink more water",
                desc: "Staying hydrated helps regulate cortisol and reduces stress. Aim for 8 glasses daily.",
                query: "hydration stress relief"
            },
            {
                icon: "fa-mug-saucer",
                title: "Reduce caffeine",
                desc: "Caffeine can spike anxiety and stress hormones. Try switching to herbal tea.",
                query: "caffeine stress reduction"
            },
            {
                icon: "fa-sun",
                title: "Daily sunlight exposure",
                desc: "Morning sunlight boosts vitamin D and serotonin, improving mood and lowering stress.",
                query: "sunlight exposure stress"
            },
            {
                icon: "fa-person-walking",
                title: "20–30 min daily exercise",
                desc: "Moderate exercise releases endorphins, reduces stress, and improves sleep.",
                query: "exercise for stress management"
            }
        ];

        function renderTips(containerId, items) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            let html = '<ul class="block-grid">';
            items.forEach(item => {
                html += `
                    <li class="block-card">
                        <div class="card-icon"><i class="fas ${item.icon}"></i></div>
                        <div class="card-content">
                            <div class="card-title">${item.title}</div>
                            <div class="card-desc">${item.desc}</div>
                            <a href="${getSearchUrl(item.query)}" target="_blank" class="card-link"><i class="fas fa-magnifying-glass"></i> Learn more</a>
                        </div>
                    </li>
                `;
            });
            html += '</ul>';
            container.innerHTML = html;
        }

        renderTips('lifestyle-content', lifestyleTips);
    </script>
</body>
</html>
