<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindFlow · Physical Activity</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .detail-page {
            max-width: 1200px;
            margin: 2rem auto;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 3rem;
            padding: 2rem;
            box-shadow: 0 20px 40px -10px #1f4b57;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .page-header h1 {
            font-weight: 400;
            color: #1b4c5c;
            font-size: 2.2rem;
        }
        .back-btn {
            background: #2f7d8f;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .back-btn:hover {
            background: #3e93a8;
        }
        .tab-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #cde3ea;
            padding-bottom: 0.5rem;
        }
        .tab {
            background: transparent;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 3rem 3rem 0 0;
            font-weight: 500;
            color: #386e7c;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .tab.active {
            background: #ffffffd0;
            color: #1f5969;
            box-shadow: 0 -4px 8px #b0d3de;
        }
        .tab:hover {
            background: #e1f2f8;
        }
        .condition-content {
            display: none;
            animation: fade 0.3s;
        }
        .condition-content.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.2rem;
            margin-top: 1rem;
        }
        .activity-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .activity-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -10px #2d6575;
        }
        .activity-card h3 {
            font-weight: 500;
            color: #194a56;
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }
        .activity-card p {
            color: #437682;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="detail-page">
        <div class="page-header">
            <h1><i class="fas fa-heartbeat" style="color:#2f7d8f;"></i> Physical Activity</h1>
            <a href="solutions.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Remedies</a>
        </div>

        <!-- Tabs for conditions -->
        <div class="tab-container" id="tabContainer">
            <button class="tab active" data-condition="stress">Stress</button>
            <button class="tab" data-condition="anxiety">Anxiety</button>
            <button class="tab" data-condition="depression">Depression</button>
            <button class="tab" data-condition="sleep">Sleep Deprivation</button>
            <button class="tab" data-condition="distraction">Distraction</button>
        </div>

        <!-- Content containers -->
        <div id="stress" class="condition-content active"></div>
        <div id="anxiety" class="condition-content"></div>
        <div id="depression" class="condition-content"></div>
        <div id="sleep" class="condition-content"></div>
        <div id="distraction" class="condition-content"></div>
    </div>

    <script>
        // Physical activity data with slugs
        const physicalData = {
            stress: [
                { title: "Deep Breathing Exercise (4-4-4 Method)", desc: "Inhale 4s, hold 4s, exhale 4s. Repeat 1–2 minutes.", slug: "breathing-444" },
                { title: "Neck and Shoulder Stretch", desc: "Roll shoulders, tilt head side to side.", slug: "neck-shoulder-stretch" },
                { title: "Eye Relaxation Exercise (20-20-20 Rule)", desc: "Every 20 minutes, look 20 feet away for 20 seconds. Palming.", slug: "eye-relaxation" },
                { title: "Short Walk or Stand-Up Stretch", desc: "Stand, stretch, walk 2–3 minutes.", slug: "short-walk" }
            ],
            anxiety: [
                { title: "Grounding Exercise (5-4-3-2-1 Method)", desc: "Identify 5 things you see, 4 touch, 3 hear, 2 smell, 1 taste.", slug: "grounding-54321" },
                { title: "Slow Walking for 3–5 Minutes", desc: "Focus on breathing and surroundings.", slug: "slow-walking" },
                { title: "Hand Relaxation Exercise", desc: "Clench fists 5s, release. Repeat 5 times.", slug: "hand-relaxation" },
                { title: "Shoulder and Arm Stretch", desc: "Stretch arms above head, hold 10s.", slug: "shoulder-arm-stretch" }
            ],
            depression: [
                { title: "Short Sunlight Walk (5–10 Minutes)", desc: "Natural light improves mood and energy.", slug: "sunlight-walk" },
                { title: "Gentle Full Body Stretch", desc: "Stretch arms, legs, back slowly.", slug: "full-body-stretch" },
                { title: "Smile Exercise", desc: "Hold a gentle smile for 30–60 seconds.", slug: "smile-exercise" },
                { title: "Light Movement Exercise", desc: "Arm circles, slow squats, stepping in place.", slug: "light-movement" }
            ],
            sleep: [
                { title: "Eye Relaxation Exercise", desc: "Rub palms, place over eyes for 30s.", slug: "eye-palming" },
                { title: "Gentle Neck Stretch", desc: "Tilt head forward, backward, side to side.", slug: "neck-stretch" },
                { title: "Slow Deep Breathing", desc: "Inhale 4s, exhale 6s for 2–3 minutes.", slug: "breathing-4-6" },
                { title: "Light Body Stretch", desc: "Stretch arms, back, legs.", slug: "light-body-stretch" }
            ],
            distraction: [
                { title: "Eye Focus Exercise", desc: "Focus on near object, then far away. Repeat.", slug: "eye-focus" },
                { title: "Quick Standing Stretch", desc: "Stretch arms above head, deep breaths.", slug: "quick-standing-stretch" },
                { title: "Hand and Finger Stretch", desc: "Stretch fingers, rotate wrists.", slug: "hand-finger-stretch" },
                { title: "Short Walk Break", desc: "2–3 minute walk away from desk.", slug: "short-walk-break" }
            ]
        };

        function renderCondition(containerId, items) {
            const container = document.getElementById(containerId);
            if (!container) return;
            let html = '<div class="activity-grid">';
            items.forEach(item => {
                html += `
                    <a href="activity.html?activity=${item.slug}" class="activity-card">
                        <h3>${item.title}</h3>
                        <p>${item.desc}</p>
                    </a>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // Render all
        renderCondition('stress', physicalData.stress);
        renderCondition('anxiety', physicalData.anxiety);
        renderCondition('depression', physicalData.depression);
        renderCondition('sleep', physicalData.sleep);
        renderCondition('distraction', physicalData.distraction);

        // Tab switching
        const tabs = document.querySelectorAll('.tab');
        const contents = document.querySelectorAll('.condition-content');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                contents.forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.condition).classList.add('active');
            });
        });
    </script>
</body>
</html>
